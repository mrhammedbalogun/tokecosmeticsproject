name: ci-frontend

on:
  push:
    paths: ["storefront/**", "admin/**", ".github/workflows/ci-frontend.yml"]
  pull_request:
    paths: ["storefront/**", "admin/**", ".github/workflows/ci-frontend.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [storefront, admin]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run build
