{% extends "email/base.html" %}
{% block content %}
  <p>Hi {{ first_name|default:"there" }},</p>
  <p>We received a request to reset your Toke Cosmetics password.</p>
  <p>
    <a href="{{ reset_url }}"
       style="display:inline-block;background:#1a1a1a;color:#ffffff;text-decoration:none;
              padding:12px 20px;border-radius:8px;">Choose a new password</a>
  </p>
  <p style="color:#666;font-size:13px;">If you didn't request this, you can safely ignore this email.</p>
{% endblock %}
