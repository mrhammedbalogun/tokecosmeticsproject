# Local development services. Ports are offset (5433/6380/7700) to avoid clashing
# with anything already running on the standard ports. Not for production
# (prod stack is infra/docker-compose.prod.yml, Plan-02).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: toke
      POSTGRES_PASSWORD: toke
      POSTGRES_DB: toke
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toke"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: devmasterkey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili:/meili_data

volumes:
  pgdata: {}
  meili: {}
